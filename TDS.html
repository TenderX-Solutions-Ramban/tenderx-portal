<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TDS Summary - TenderX</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-950 via-blue-900 to-blue-800 min-h-screen p-6">

<div class="max-w-4xl mx-auto">

  <!-- INPUT SECTION -->
  <div id="inputSection" class="bg-white rounded-2xl p-6 shadow-lg mb-6">

    <h1 class="text-2xl font-bold mb-4">TDS Credit Received - Input</h1>

    <div class="grid md:grid-cols-2 gap-3 mb-4">
      <input id="customer" placeholder="Customer Name" class="p-3 border rounded">
      <input id="user" placeholder="Prepared By" class="p-3 border rounded">
    </div>

    <div id="rows" class="space-y-2 mb-4"></div>

    <div class="flex gap-2 mb-4">
      <button onclick="addRow()" class="bg-blue-600 text-white px-4 py-2 rounded">
        + Add Row
      </button>
    </div>

    <button onclick="generateResult()" 
      class="bg-green-600 text-white px-6 py-3 rounded-xl font-semibold">
      Generate Output
    </button>

  </div>

  <!-- RESULT SECTION -->
  <div id="resultSection" class="hidden">

    <div class="bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 text-center">

      <!-- Logo -->
      <div class="flex justify-center mb-4">
        <img src="https://via.placeholder.com/80" class="h-16 w-16 rounded-full shadow">
      </div>

      <h1 class="text-2xl font-bold text-gray-800">TDS Credit Received</h1>
      <p class="text-gray-500 mb-6">Summary Report</p>

      <div class="text-left mb-4">
        <p><b>Customer:</b> <span id="resCustomer"></span></p>
        <p><b>Prepared By:</b> <span id="resUser"></span></p>
      </div>

      <div class="border-t mb-4"></div>

      <div id="resData" class="space-y-2 text-left text-sm"></div>

      <div class="border-t my-5"></div>

      <div class="text-2xl font-bold text-blue-700 mb-6">
        Total: ₹<span id="resTotal"></span>
      </div>

      <div class="flex justify-center gap-3">
        <button onclick="shareWhatsApp()" class="bg-green-500 text-white px-4 py-2 rounded">
          WhatsApp
        </button>
        <button onclick="copyText()" class="bg-black text-white px-4 py-2 rounded">
          Copy
        </button>
      </div>

    </div>

  </div>

</div>

<script>

// Month + FY
const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];

function getFinancialYears(){
  let years=[];
  let current=new Date().getFullYear();
  for(let i=current-2;i<=current+2;i++){
    years.push(`${i}-${i+1}`);
  }
  return years;
}

// Add Row
function addRow(){
  let div=document.createElement("div");
  div.className="grid grid-cols-4 gap-2";

  let monthOpt=months.map(m=>`<option>${m}</option>`).join('');
  let fyOpt=getFinancialYears().map(y=>`<option>${y}</option>`).join('');

  div.innerHTML=`
    <select class="month p-2 border rounded">${monthOpt}</select>
    <select class="fy p-2 border rounded">${fyOpt}</select>
    <input placeholder="Amount (322070+347440)" class="amount p-2 border rounded col-span-2">
  `;

  document.getElementById("rows").appendChild(div);
}

// Parse Amount
function parseAmount(v){
  if(!v) return 0;
  let clean=v.replace(/,/g,'');
  return clean.split('+').reduce((s,n)=>s+(parseFloat(n)||0),0);
}

// Format INR
function formatINR(n){
  return n.toLocaleString('en-IN');
}

// Month Format
function getDisplayMonth(m,fy){
  let [s,e]=fy.split('-').map(Number);
  return ["Jan","Feb","Mar"].includes(m)?`${m}-${e}`:`${m}-${s}`;
}

// Generate Result
function generateResult(){

  let customer=document.getElementById("customer").value||"-";
  let user=document.getElementById("user").value||"-";

  document.getElementById("resCustomer").innerText=customer;
  document.getElementById("resUser").innerText=user;

  let resData=document.getElementById("resData");
  resData.innerHTML="";

  let total=0;

  document.querySelectorAll("#rows > div").forEach(row=>{
    let m=row.querySelector(".month").value;
    let fy=row.querySelector(".fy").value;
    let amt=row.querySelector(".amount").value;

    let sum=parseAmount(amt);
    total+=sum;

    let display=getDisplayMonth(m,fy);

    resData.innerHTML+=`
      <div class="flex justify-between">
        <span>${display}</span>
        <span class="font-medium">₹${formatINR(sum)}</span>
      </div>
    `;
  });

  document.getElementById("resTotal").innerText=formatINR(total);

  // switch view
  document.getElementById("inputSection").classList.add("hidden");
  document.getElementById("resultSection").classList.remove("hidden");
}

// Message
function generateMessage(){
  let customer=document.getElementById("resCustomer").innerText;
  let user=document.getElementById("resUser").innerText;
  let total=document.getElementById("resTotal").innerText;

  let msg=`TDS Credit Received - Summary\n\nCustomer: ${customer}\nPrepared By: ${user}\n\n`;

  document.querySelectorAll("#resData div").forEach(row=>{
    let m=row.children[0].innerText;
    let a=row.children[1].innerText;
    msg+=`${m} ${a}\n`;
  });

  msg+=`\nTotal: ₹${total}\n\n— Team TenderX`;
  return msg;
}

// Share
function shareWhatsApp(){
  window.open("https://wa.me/?text="+encodeURIComponent(generateMessage()),"_blank");
}

// Copy
function copyText(){
  navigator.clipboard.writeText(generateMessage());
  alert("Copied!");
}

// Start
addRow();

</script>

</body>
</html>
