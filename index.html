<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TenderX Maintenance</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #0a0a0a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 40px;
}

.logo {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

.logo span {
    color: #4f8cff;
}

h1 {
    font-size: 36px;
    margin-bottom: 15px;
}

p {
    color: #aaa;
    margin-bottom: 30px;
    line-height: 1.6;
}

.timer {
    font-size: 42px;
    font-weight: 700;
    margin-bottom: 30px;
    color: #4f8cff;
}

.box {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 16px;
    background: linear-gradient(145deg, #111, #0c0c0c);
    box-shadow: 0 0 30px rgba(79,140,255,0.1);
}

.footer {
    margin-top: 30px;
    font-size: 14px;
    color: #666;
}

.status {
    margin-top: 15px;
    font-size: 14px;
    color: #4f8cff;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">Tender<span>X</span></div>

    <div class="box">
        <h1>We’ll Be Back Shortly</h1>
        <p>
            TenderX is undergoing a quick system upgrade to enhance performance, security, and reliability.
            Estimated downtime: 30 minutes.
        </p>

        <div class="timer" id="countdown">30:00</div>

        <div class="status">🔧 System Upgrade in Progress</div>
    </div>

    <div class="footer">
        © 2026 TenderX Solutions
    </div>
</div>

<script>
// 30 minutes countdown
let time = 30 * 60;

const countdownEl = document.getElementById("countdown");

const timer = setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    countdownEl.innerHTML = `${minutes}:${seconds}`;

    if (time <= 0) {
        clearInterval(timer);
        countdownEl.innerHTML = "Back Online!";
    }

    time--;
}, 1000);
</script>

</body>
</html>
