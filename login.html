<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | TenderX Solutions</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">
    <div class="card auth-card animate-fade">
        <div class="auth-logo">
            <img src="tenderX%20Logo.png" alt="TenderX Logo">
            <div>
                <span style="font-size: 1.5rem; font-weight: 800; display: block;">TenderX <span class="text-muted" style="font-weight: 400;">Solutions</span></span>
                <h2 class="subtitle" style="font-size: 1.1rem; font-weight: 700; color: white; margin-top: 5px;">Admin Portal</h2>
            </div>
            <p class="text-muted" style="font-size: 0.9rem;">Secure management access</p>
        </div>

            <form id="loginForm">
                <div class="form-group mb-md">
                    <label class="label">Admin Email</label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                        <input type="email" id="email" name="email" placeholder="admin@tenderx.io" required class="input" style="padding-left: 3rem;">
                    </div>
                </div>
                <div class="form-group mb-lg">
                    <label class="label">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required class="input" style="padding-left: 3rem;">
                    </div>
                </div>
                <button type="submit" class="btn primary" style="width: 100%; padding: 1rem; font-size: 1rem;">Sign In</button>
                
                <div class="flex" style="flex-direction: column; gap: 1rem; margin-top: 2rem; text-align: center;">
                    <a href="index.html" class="text-muted" style="font-size: 0.85rem; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
                        <i class="fas fa-arrow-left"></i> Back to Public Website
                    </a>
                    <a href="help.html" style="font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 600;">
                        <i class="fas fa-question-circle"></i> Visit Help Center
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Toastify for notifications -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js?v=3"></script>

    <script>
        // Ensure supabase is initialized
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            try {
                // Check if the function exists before calling
                if (typeof window.loginAdmin !== 'function') {
                    console.error("loginAdmin type:", typeof window.loginAdmin);
                    throw new Error("Configuration Error: Login script not loaded correctly.");
                }

                await window.loginAdmin(email, password);
                
                Toastify({
                    text: "Login Successful! Redirecting...",
                    duration: 2000,
                    style: { background: "#10b981" }
                }).showToast();
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Login attempt failed:", error);
                Toastify({
                    text: "Login Failed: " + error.message,
                    duration: 5000,
                    style: { background: "#f43f5e" }
                }).showToast();
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
