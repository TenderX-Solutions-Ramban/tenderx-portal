<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | TenderX Solutions</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">
    <div class="card auth-card animate-fade" style="text-align: center; border-radius: 40px; position: relative; overflow: hidden;">
        <!-- Decorative Glows -->
        <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary); opacity: 0.1; filter: blur(60px); border-radius: 50%;"></div>
        <div style="position: absolute; bottom: -50px; left: -50px; width: 150px; height: 150px; background: var(--secondary); opacity: 0.1; filter: blur(60px); border-radius: 50%;"></div>
        
        <!-- Logo with Animation -->
        <div class="auth-logo" style="margin-bottom: 2rem;">
            <div style="width: 100px; height: 100px; background: white; border-radius: 50%; margin: 0 auto; padding: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: float 6s ease-in-out infinite;">
                <img src="tenderX%20Logo.png" alt="TenderX Logo" style="width: 100%; height: auto;">
            </div>
        </div>

        <!-- Status Check -->
        <div class="flex-center mb-lg">
            <div style="width: 70px; height: 70px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #10b981; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.1);">
                <i class="fas fa-check"></i>
            </div>
        </div>

        <h1 class="title" style="font-size: 2rem; margin-bottom: 0.5rem; font-weight: 800;">Goodbye!</h1>
        <p class="text-muted" style="margin-bottom: 2.5rem; font-size: 1rem;">You have been securely logged out. We've cleared your local session data.</p>
        
        <div class="flex-col gap-md">
            <a href="login.html" class="btn primary" style="padding: 1.1rem; width: 100%; font-size: 1rem;">
                Sign In Again
            </a>
            <a href="index.html" class="btn outline" style="padding: 1.1rem; width: 100%; font-size: 1rem;">
                Back to Homepage
            </a>
        </div>
        
        <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--card-border);">
            <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700;">TenderX Solutions • Portal v2.0</p>
        </div>
    </div>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</body>
</html>
